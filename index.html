<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lnk — Raccourcisseur d'URL</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; }
:root {
  --bg: #1a1410; --surface: #2a2018; --card: #33241b;
  --border: #5a4a3a; --text: #f0eff8; --text-muted: #a09080;
  --accent: #c9a84c; --accent-dim: #b8860b;
  --green: #10b981; --red: #ef4444; --radius: 12px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
.light {
  --bg: #f5f0e8; --surface: #ede4d4; --card: #faf5eb;
  --border: #c9b89a; --text: #2a2018; --text-muted: #8a7a6a;
  --accent: #b8860b; --accent-dim: #8b6914;
}
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  min-height: 100vh; line-height: 1.5; transition: background .3s, color .3s;
}
.theme-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 20;
  background: var(--surface); border: 1px solid var(--border); color: var(--accent);
  font-size: 1.1rem; padding: 6px 12px; border-radius: 50px; cursor: pointer;
  transition: all .2s;
}
.theme-toggle:hover { border-color: var(--accent); background: var(--card); }
.container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; width: 100%; }

header { text-align: center; margin-bottom: 2.5rem; }
header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
header h1 span { color: var(--accent); }
header p { color: var(--text-muted); font-size: 0.9rem; }

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem;
}

.form-group { margin-bottom: 1rem; }
label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.3rem; }
.input-row { display: flex; gap: 0.5rem; }
.input-row input { flex: 1; }
input, button { font-family: var(--font); font-size: 0.9rem; }
input {
  width: 100%; padding: 0.65rem 0.9rem; background: var(--surface);
  border: 1px solid var(--border); border-radius: 6px; color: var(--text);
  outline: none; transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--text-muted); opacity: 0.6; }

.btn {
  padding: 0.65rem 1.2rem; border: none; border-radius: 6px;
  cursor: pointer; font-weight: 600; transition: opacity 0.2s; white-space: nowrap;
}
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { opacity: 0.85; }
.btn-danger { background: var(--red); color: white; }
.btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface); }
.btn-sm { padding: 0.4rem 0.75rem; font-size: 0.8rem; }

table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 0.7rem 0.5rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
th { color: var(--text-muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
th:hover { color: var(--text); }
tr.link-row { cursor: pointer; transition: background 0.15s; }
tr.link-row:hover { background: var(--surface); }
td.url-cell { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.actions { text-align: right; white-space: nowrap; }
td.clicks { text-align: center; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.short-link { color: var(--accent); text-decoration: none; font-weight: 500; }
.short-link:hover { text-decoration: underline; }

.detail-row { display: none; }
.detail-row.open { display: table-row; }
.detail-cell { padding: 0 0.5rem 0.75rem !important; }
.detail-box { background: var(--surface); border-radius: 8px; padding: 1rem; margin: 0; }
.detail-box h4 { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
.click-item { font-size: 0.8rem; color: var(--text-muted); padding: 0.3rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 1rem; }
.click-item:last-child { border-bottom: none; }
.click-item .ref { color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.click-item .date { white-space: nowrap; }
.click-item .ua { color: var(--text-muted); font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
.loading-clicks { color: var(--text-muted); font-size: 0.8rem; padding: 0.5rem 0; }
.empty-clicks { color: var(--text-muted); font-size: 0.8rem; padding: 0.5rem 0; font-style: italic; }

.empty-state { text-align: center; padding: 2rem; color: var(--text-muted); }
.empty-state svg { width: 40px; height: 40px; margin-bottom: 0.8rem; opacity: 0.4; }
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: var(--green); color: white; padding: 0.6rem 1.2rem;
  border-radius: 8px; font-size: 0.85rem; font-weight: 600;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; }
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.error { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; }

.sort-indicator { margin-left: 3px; opacity: 0.5; }
#linksContainer { overflow-x: auto; -webkit-overflow-scrolling: touch; }
</style>
</head>
<body>
<button class="theme-toggle" id="themeToggle" aria-label="Theme">🌙</button>
<div class="container">
  <header>
    <h1>Lnk</h1>
    <p>Raccourcisseur d'URL libre &amp; open source</p>
  </header>

  <div class="card">
    <div class="form-group">
      <label for="url">URL à raccourcir</label>
      <div class="input-row">
        <input id="url" type="url" placeholder="https://exemple.com/longue-url" autofocus>
        <button class="btn btn-primary" id="shortenBtn">Raccourcir</button>
      </div>
    </div>
    <div class="form-group" style="margin-top:0.7rem">
      <label for="slug">Slug personnalisé (optionnel)</label>
      <input id="slug" type="text" placeholder="mon-lien" style="max-width:250px">
    </div>
    <div id="formError" class="error" style="display:none"></div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <h2 style="font-size:1rem;font-weight:600">Liens</h2>
      <span id="linkCount" style="font-size:0.8rem;color:var(--text-muted)">0</span>
    </div>
    <div id="linksContainer">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
        <p>Aucun lien pour l'instant</p>
      </div>
      <table id="linksTable" style="display:none">
        <thead><tr>
          <th onclick="sortBy('slug')">Slug<span class="sort-indicator">⇅</span></th>
          <th onclick="sortBy('url')">URL<span class="sort-indicator">⇅</span></th>
          <th onclick="sortBy('clicks')" style="text-align:center">Clics<span class="sort-indicator">⇅</span></th>
          <th onclick="sortBy('created_at')">Date<span class="sort-indicator">⇅</span></th>
          <th></th>
        </tr></thead>
        <tbody id="linksBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://urlshort-rouge.vercel.app/api';
const SHORT_DOMAIN = 'https://urlshort-rouge.vercel.app';

let linksCache = [];
let openDetail = null;

async function fetchLinks() {
  const res = await fetch(`${API}/links`);
  if (!res.ok) throw new Error('Erreur chargement');
  return res.json();
}

async function createLink(url, slug) {
  const res = await fetch(`${API}/links`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, slug: slug || undefined })
  });
  if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Erreur création'); }
  return res.json();
}

async function deleteLink(id) {
  await fetch(`${API}/links`, {
    method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id })
  });
}

async function fetchClicks(linkId) {
  const res = await fetch(`${API}/clicks?linkId=${linkId}`);
  if (!res.ok) return [];
  return res.json();
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function escapeHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function shortUA(ua) {
  if (!ua) return '-';
  const m = ua.match(/(Chrome\/\d+|Firefox\/\d+|Safari\/\d+|Edge\/\d+|Mobile|iPhone|Android)/);
  return m ? m[0] : ua.substring(0, 40);
}

let sortField = 'created_at';
let sortDir = -1;

function sortBy(field) {
  if (sortField === field) sortDir *= -1;
  else { sortField = field; sortDir = -1; }
  renderLinks(linksCache);
}

function renderLinks(links) {
  linksCache = links;
  const tbody = document.getElementById('linksBody');
  const table = document.getElementById('linksTable');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('linkCount');
  count.textContent = links.length;

  if (!links.length) { table.style.display = 'none'; empty.style.display = 'block'; return; }
  table.style.display = ''; empty.style.display = 'none';

  const sorted = [...links].sort((a, b) => {
    const va = a[sortField] || '', vb = b[sortField] || '';
    if (sortField === 'clicks') return (va - vb) * sortDir;
    return String(va).localeCompare(String(vb)) * sortDir;
  });

  const base = SHORT_DOMAIN + '/go/';
  let html = '';
  for (const l of sorted) {
    const isOpen = openDetail === l.id;
    html += `<tr class="link-row" onclick="toggleDetail(${l.id})">
      <td><a class="short-link" href="${base}${l.slug}" target="_blank" onclick="event.stopPropagation()">${l.slug}</a></td>
      <td class="url-cell" title="${escapeHtml(l.url)}">${escapeHtml(l.url)}</td>
      <td class="clicks">${l.clicks}</td>
      <td style="color:var(--text-muted);font-size:0.8rem">${formatDate(l.created_at)}</td>
      <td class="actions">
        <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();copyLink('${base}${l.slug}')">Copier</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();removeLink(${l.id})" style="margin-left:4px">×</button>
      </td>
    </tr>`;
    html += `<tr class="detail-row ${isOpen ? 'open' : ''}" id="detail-${l.id}">
      <td colspan="5" class="detail-cell">
        <div class="detail-box" id="detail-content-${l.id}">
          <div class="loading-clicks"><span class="spinner" style="vertical-align:middle;margin-right:6px"></span> Chargement…</div>
        </div>
      </td>
    </tr>`;
  }
  tbody.innerHTML = html;

  if (openDetail !== null) loadClicks(openDetail);
}

async function loadClicks(linkId) {
  const box = document.getElementById(`detail-content-${linkId}`);
  if (!box) return;
  try {
    const clicks = await fetchClicks(linkId);
    if (!clicks.length) { box.innerHTML = '<div class="empty-clicks">Aucun clic enregistré</div>'; return; }
    const items = clicks.map(c => {
      const ref = c.referer ? `<span class="ref" title="${escapeHtml(c.referer)}">${escapeHtml(c.referer)}</span>` : '<span class="ref" style="color:var(--text-muted)">—</span>';
      return `<div class="click-item">${ref}<span class="date">${formatDate(c.created_at)}</span><span class="ua">${escapeHtml(shortUA(c.user_agent))}</span></div>`;
    }).join('');
    box.innerHTML = `<h4>Derniers clics</h4>${items}`;
  } catch(e) {
    box.innerHTML = '<div class="empty-clicks">Erreur chargement</div>';
  }
}

function toggleDetail(id) {
  const wasOpen = openDetail === id;
  // close all
  document.querySelectorAll('.detail-row').forEach(r => r.classList.remove('open'));
  openDetail = wasOpen ? null : id;
  if (openDetail !== null) {
    const row = document.getElementById(`detail-${id}`);
    if (row) row.classList.add('open');
    loadClicks(id);
  }
}

function copyLink(url) { navigator.clipboard.writeText(url).then(() => toast('Copié !')); }

async function removeLink(id) {
  try {
    if (openDetail === id) openDetail = null;
    await deleteLink(id);
    await loadLinks();
    toast('Supprimé');
  } catch(e) {
    toast('Erreur suppression');
  }
}

async function loadLinks() {
  const links = await fetchLinks();
  renderLinks(links);
}

document.getElementById('shortenBtn').addEventListener('click', async () => {
  const url = document.getElementById('url').value.trim();
  const slug = document.getElementById('slug').value.trim();
  const errorEl = document.getElementById('formError');
  if (!url) { errorEl.textContent = 'Entrez une URL'; errorEl.style.display = ''; return; }
  if (!url.match(/^https?:\/\//i)) url = 'https://' + url;
  errorEl.style.display = 'none';
  const btn = document.getElementById('shortenBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner" style="vertical-align:middle"></span>';
  try {
    const link = await createLink(url, slug);
    document.getElementById('url').value = '';
    document.getElementById('slug').value = '';
    await loadLinks();
    toast(`✓ ${SHORT_DOMAIN}/go/${link.slug}`);
  } catch (e) { errorEl.textContent = e.message; errorEl.style.display = ''; }
  finally { btn.disabled = false; btn.textContent = 'Raccourcir'; }
});

document.getElementById('url').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('shortenBtn').click();
});

loadLinks().catch(() => toast('Impossible de charger les liens'));

const toggle = document.getElementById('themeToggle');
toggle.addEventListener('click', () => {
  document.body.classList.toggle('light');
  toggle.textContent = document.body.classList.contains('light') ? '☀️' : '🌙';
  localStorage.setItem('lnkTheme', document.body.classList.contains('light') ? 'light' : 'dark');
});
if (localStorage.getItem('lnkTheme') === 'light') {
  document.body.classList.add('light');
  toggle.textContent = '☀️';
}
</script>
</body>
</html>
